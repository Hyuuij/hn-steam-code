<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر HN - بوابة الأكواد</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/steam-totp-js@1.0.1/dist/steam-totp.min.js"></script>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="overlay"></div>

    <div class="card">
        <img src="logo.png" alt="Logo" class="logo">
        <h2>بوابة استخراج الأكواد</h2>
        <p>أدخل بيانات الطلب للحصول على كود Steam Guard</p>

        <input type="text" id="orderInput" placeholder="رقم الطلب (Order ID)">
        <input type="text" id="userInput" placeholder="اسم الحساب (Username)">
        
        <button onclick="fetchAndGenerate()">استخراج الكود الآن</button>

        <div id="resultArea" class="result-container">
            <div id="steamCode" class="code-display">-----</div>
            <div id="attemptsText" class="info-text"></div>
            <div id="timerText" class="info-text"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
