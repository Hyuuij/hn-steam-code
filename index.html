<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر HN - استخراج الكود</title>
    <script src="https://cdn.jsdelivr.net/npm/steam-totp-js@1.0.1/dist/steam-totp.min.js"></script>
    <style>
        :root { 
            --main-teal: #1994a4; 
            --main-gray: #b1b1b3; 
            --dark-bg: #101822; 
            --overlay-color: rgba(16, 24, 34, 0.85); 
        }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; }
        
        /* الخلفية المغبشة */
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('pattern.png'); background-repeat: repeat; filter: blur(6px); transform: scale(1.1); z-index: -2; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--overlay-color); z-index: -1; }
        
        /* البطاقة الرئيسية */
        .card { 
            background: rgba(42, 71, 94, 0.7); 
            padding: 40px 30px; 
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.15); 
            z-index: 1; 
        }

        /* الشعار */
        .store-logo { max-width: 220px; margin-bottom: 20px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }

        h2 { font-size: 24px; color: var(--main-teal); margin-bottom: 10px; }
        p { font-size: 16px; color: var(--main-gray); margin-bottom: 25px; }

        /* حقول الإدخال */
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border: 2px solid #16202d; 
            background: var(--dark-bg); 
            color: white; 
            box-sizing: border-box; 
            font-size: 18px; 
            text-align: center; 
            font-weight: bold;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--main-teal); }

        /* الزر */
        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--main-teal); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            font-size: 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        button:hover { background: #147a88; transform: translateY(-2px); }

        /* النتيجة */
        #result { margin-top: 30px; display: none; border-top: 2px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .code { font-size: 65px; font-weight: bold; letter-spacing: 12px; color: #fff; text-shadow: 0 0 25px var(--main-teal); font-family: monospace; }
        .attempts { font-size: 15px; color: #ff6b6b; margin-top: 15px; font-weight: bold; }
        .timer { font-size: 16px; color: var(--main-gray); margin-top: 10px; }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>
    <div class="card">
        <img src="logo.png" alt="شعار متجر HN" class="store-logo" onerror="this.style.display='none';">
        
        <h2>بوابة استخراج الأكواد</h2>
        <p>أدخل بياناتك للحصول على كود Steam Guard</p>
        
        <input type="text" id="orderInput" placeholder="رقم الطلب (مثال: 244411297)">
        
        <input type="text" id="usernameInput" placeholder="اسم حساب ستيم (Username)">
        
        <button onclick="checkAndFetch()">استخراج الكود الآن</button>

        <div id="result">
            <div class="code" id="steamCode">-----</div>
            <div id="attemptsText" class="attempts"></div>
            <div class="timer" id="timer"></div>
        </div>
    </div>

    <script>
        // رابط جوجل شيت الخاص بك
        const googleSheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdht6CoTy4Ldy3IguEeGB3c4lHKjnorQwyJe0D6BWG10t9D21BB-Q_-JZilVd8m6aslgNMYy93u2Yi/pub?gid=0&single=true&output=csv";

        async function checkAndFetch() {
            const orderId = document.getElementById('orderInput').value.trim();
            const username = document.getElementById('usernameInput').value.trim().toLowerCase();

            if (!orderId || !username) {
                return alert("فضلاً أدخل رقم الطلب واسم الحساب!");
            }

            // فحص عدد المحاولات لرقم الطلب هذا
            let attempts = localStorage.getItem('attempts_' + orderId) || 0;
            attempts = parseInt(attempts);

            if (attempts >= 3) {
                return alert("عذراً! لقد وصلت للحد الأقصى للمحاولات (3 مرات) لرقم الطلب هذا.");
            }

            try {
                const response = await fetch(googleSheetCSV);
                const data = await response.text();
                const rows = data.split(/\r?\n/); 
                
                let orderFound = false;
                let secret = null;

                // البحث في الجدول
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(",");
                    
                    // 1. هل رقم الطلب موجود في العمود A (حتى لو في صف لحاله)؟
                    if (cols[0] && cols[0].trim() === orderId) {
                        orderFound = true;
                    }

                    // 2. هل اسم الحساب موجود في العمود B؟ إذا نعم، خذ السر من العمود C لنفس الصف
                    if (cols[1] && cols[1].trim().toLowerCase() === username) {
                        secret = cols[2] ? cols[2].trim() : null;
                    }
                }

                // التحقق من النتائج
                if (!orderFound) {
                    return alert("رقم الطلب غير موجود في النظام!");
                }

                if (!secret) {
                    return alert("اسم الحساب غير صحيح، أو لم يتم ربط كود به بعد!");
                }

                // إذا كان الطلب موجود والحساب صحيح -> احسب المحاولة واعرض الكود
                attempts++;
                localStorage.setItem('attempts_' + orderId, attempts);
                
                document.getElementById('result').style.display = 'block';
                document.getElementById('attemptsText').innerText = `المحاولات المستخدمة: ${attempts} من 3`;
                showCode(secret);

            } catch (err) {
                alert("حدث خطأ في الاتصال بقاعدة البيانات!");
            }
        }

        function showCode(secret) {
            const update = () => {
                const code = SteamTotp.generateAuthCode(secret);
                document.getElementById('steamCode').innerText = code;
                let seconds = 30 - (Math.floor(Date.now() / 1000) % 30);
                document.getElementById('timer').innerText = `يتغير الكود تلقائياً خلال: ${seconds} ثانية`;
            };
            update();
            if (window.timerInterval) clearInterval(window.timerInterval);
            window.timerInterval = setInterval(update, 1000);
        }
    </script>
</body>
</html>
