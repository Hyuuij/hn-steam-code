<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر HN - استخراج الكود</title>
    <script src="https://cdn.jsdelivr.net/npm/steam-totp-js@1.0.1/dist/steam-totp.min.js"></script>
    <style>
        :root { 
            --main-teal: #1994a4; 
            --main-gray: #b1b1b3; 
            --dark-bg: #101822; 
            --overlay-color: rgba(16, 24, 34, 0.85); 
        }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; }
        
        /* الخلفية */
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('pattern.png'); background-repeat: repeat; filter: blur(5px); transform: scale(1.1); z-index: -2; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--overlay-color); z-index: -1; }
        
        /* البطاقة الرئيسية - تكبير الحجم */
        .card { 
            background: rgba(42, 71, 94, 0.7); 
            padding: 50px 40px; /* زيادة الحشو الداخلي */
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            width: 95%; 
            max-width: 500px; /* تكبير عرض البطاقة */
            text-align: center; 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.15); 
            z-index: 1; 
        }

        /* الشعار - تكبير الحجم */
        .store-logo { max-width: 250px; margin-bottom: 25px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }

        h2 { font-size: 28px; color: var(--main-teal); margin-bottom: 15px; }
        p { font-size: 18px; color: var(--main-gray); margin-bottom: 25px; }

        /* حقل الإدخال - تكبير الحجم والخط */
        input { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            border: 2px solid #16202d; 
            background: var(--dark-bg); 
            color: white; 
            box-sizing: border-box; 
            font-size: 22px; /* تكبير خط رقم الطلب */
            text-align: center; 
            font-weight: bold;
        }
        input:focus { outline: none; border-color: var(--main-teal); }

        /* الزر - تكبير الحجم */
        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--main-teal); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            font-size: 20px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        button:hover { background: #147a88; transform: translateY(-2px); }

        /* النتيجة - تكبير الخط */
        #result { margin-top: 35px; display: none; border-top: 2px solid rgba(255,255,255,0.1); padding-top: 25px; }
        .code { font-size: 75px; font-weight: bold; letter-spacing: 12px; color: #fff; text-shadow: 0 0 25px var(--main-teal); font-family: monospace; }
        .attempts { font-size: 16px; color: #ff6b6b; margin-top: 15px; font-weight: bold; }
        .timer { font-size: 18px; color: var(--main-gray); margin-top: 10px; }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>
    <div class="card">
        <img src="logo.png" alt="HN Logo" class="store-logo">
        <h2>استخراج كود الحساب</h2>
        <p>يرجى إدخال رقم الطلب الخاص بك</p>
        
        <input type="text" id="orderInput" placeholder="رقم الطلب (مثلاً: 244411297)">
        <button onclick="checkAndFetch()">استخراج الكود الآن</button>

        <div id="result">
            <div class="code" id="steamCode">-----</div>
            <div id="attemptsText" class="attempts"></div>
            <div class="timer" id="timer"></div>
        </div>
    </div>

    <script>
        // رابط الـ CSV الخاص بك
        const googleSheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdht6CoTy4Ldy3IGueEGB3c4lHKjnorQwy3e0D6BWG10T9D21B8-Q-_-JZ1lvd8m6aslgNMYy93u2Yi/pub?output=csv";

        async function checkAndFetch() {
            const orderId = document.getElementById('orderInput').value.trim();
            if (!orderId) return alert("فضلاً أدخل رقم الطلب");

            let attempts = localStorage.getItem('attempts_' + orderId) || 0;
            attempts = parseInt(attempts);

            if (attempts >= 3) {
                return alert("لقد وصلت للحد الأقصى للمحاولات (3 مرات).");
            }

            try {
                const response = await fetch(googleSheetCSV);
                const data = await response.text();
                const rows = data.split(/\r?\n/); 
                
                let secret = null;
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(",");
                    if (cols[0] && cols[0].trim() === orderId) {
                        secret = cols[2] ? cols[2].trim() : null; 
                        break;
                    }
                }

                if (secret) {
                    attempts++;
                    localStorage.setItem('attempts_' + orderId, attempts);
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('attemptsText').innerText = `المحاولات المستخدمة: ${attempts} من 3`;
                    showCode(secret);
                } else {
                    alert("رقم الطلب غير موجود! تأكد من الرقم المكتوب في جدولك.");
                }
            } catch (err) {
                alert("خطأ في الاتصال بالبيانات!");
            }
        }

        function showCode(secret) {
            const update = () => {
                const code = SteamTotp.generateAuthCode(secret);
                document.getElementById('steamCode').innerText = code;
                let seconds = 30 - (Math.floor(Date.now() / 1000) % 30);
                document.getElementById('timer').innerText = `يتغير الكود تلقائياً خلال: ${seconds} ثانية`;
            };
            update();
            if (window.timerInterval) clearInterval(window.timerInterval);
            window.timerInterval = setInterval(update, 1000);
        }
    </script>
</body>
</html>
