<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة استخراج أكواد ستيم</title>
    <script src="https://cdn.jsdelivr.net/npm/steam-totp-js@1.0.1/dist/steam-totp.min.js"></script>
    <style>
        :root { --main-bg: #1b2838; --card-bg: #2a475e; --blue: #66c0f4; --text: #c7d5e0; }
        body { background: var(--main-bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--card-bg); padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: var(--blue); margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #16202d; background: #101822; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--blue); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #4faadb; }
        #result { margin-top: 30px; }
        .code { font-size: 50px; font-weight: bold; letter-spacing: 8px; color: #fff; text-shadow: 0 0 10px var(--blue); }
        .timer { margin-top: 15px; font-size: 14px; color: var(--blue); }
    </style>
</head>
<body>

<div class="card">
    <h2>مولد أكواد 2FA</h2>
    <p style="color: var(--text)">أدخل اسم حسابك للحصول على كود الدخول</p>
    
    <input type="text" id="userInput" placeholder="مثال: Steam_User_01">
    <button onclick="fetchAndGenerate()">استخراج الكود</button>

    <div id="result" style="display:none;">
        <div class="code" id="steamCode">-----</div>
        <div class="timer" id="timer">تحديث خلال 30 ثانية...</div>
    </div>
</div>

<script>
    // ⚠️ ضع رابط الـ CSV الذي نسخته من جوجل هنا
    const googleSheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdht6CoTy4Ldy3IguEeGB3c4lHKjnorQwyJe0D6BWG10t9D21BB-Q_-JZilVd8m6aslgNMYy93u2Yi/pub?output=csv";

    async function fetchAndGenerate() {
        const user = document.getElementById('userInput').value.trim().toLowerCase();
        if (!user) return alert("فضلاً أدخل اسم المستخدم");

        try {
            const response = await fetch(googleSheetCSV);
            const data = await response.text();
            const rows = data.split("\n").slice(1); // تجاهل العنوان
            
            let secret = null;
            rows.forEach(row => {
                const cols = row.split(",");
                if (cols[0] && cols[0].trim().toLowerCase() === user) {
                    secret = cols[1].trim();
                }
            });

            if (secret) {
                showCode(secret);
            } else {
                alert("الحساب غير موجود! تأكد من الاسم أو تواصل مع الدعم.");
            }
        } catch (err) {
            alert("خطأ في الاتصال بقاعدة البيانات!");
        }
    }

    function showCode(secret) {
        document.getElementById('result').style.display = 'block';
        const update = () => {
            const code = SteamTotp.generateAuthCode(secret);
            document.getElementById('steamCode').innerText = code;
            let seconds = 30 - (Math.floor(Date.now() / 1000) % 30);
            document.getElementById('timer').innerText = `يتغير الكود بعد: ${seconds} ثانية`;
        };
        update();
        setInterval(update, 1000);
    }
</script>

</body>
</html>
