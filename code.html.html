<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة ستيم جارد - المتجر</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsSHA/2.4.2/sha.js"></script>
    <style>
        :root { --teal: #1994a4; --dark: #101822; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .bg { position: fixed; width: 100%; height: 100%; background: url('pattern.png') repeat; filter: blur(8px); z-index: -1; }
        .card { background: rgba(42, 71, 94, 0.9); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .logo { max-width: 150px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #0b1118; color: white; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--teal); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; width: 100%; }
        .result { margin-top: 25px; display: none; }
        .code { font-size: 55px; font-weight: bold; letter-spacing: 8px; color: #fff; text-shadow: 0 0 15px var(--teal); }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="card">
        <img src="logo.png" class="logo">
        <h2>استخراج كود الدخول</h2>
        <input type="text" id="orderID" placeholder="رقم الطلب (Order ID)">
        <input type="text" id="user" placeholder="اسم الحساب (Username)">
        <button onclick="start()">استخراج الكود الآن</button>
        <div id="res" class="result">
            <div id="steamCode" class="code">-----</div>
            <p id="timer" style="font-size: 13px; color: #ccc; margin-top: 10px;"></p>
        </div>
    </div>

<script>
    // رابط جدولك المباشر
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdht6CoTy4Ldy3IguEeGB3c4lHKjnorQwyJe0D6BWG10t9D21BB-Q_-JZilVd8m6aslgNMYy93u2Yi/pub?output=csv";

    async function start() {
        const oIn = document.getElementById('orderID').value.trim();
        const uIn = document.getElementById('user').value.trim().toLowerCase();

        try {
            const r = await fetch(csvUrl);
            const d = await r.text();
            const rows = d.split("\n").map(line => line.split(","));
            
            let rawSecret = null;
            for(let i=1; i<rows.length; i++) {
                if(rows[i][0]?.trim() === oIn && rows[i][1]?.trim().toLowerCase() === uIn) {
                    rawSecret = rows[i][2]?.trim();
                }
            }

            if(rawSecret) {
                document.getElementById('res').style.display = 'block';
                // تنظيف السر من أي علامات زائدة مثل =
                const cleanSecret = rawSecret.replace(/=/g, '');
                
                if (window.timerInt) clearInterval(window.timerInt);
                window.timerInt = setInterval(() => {
                    const code = generateSteamCode(cleanSecret);
                    document.getElementById('steamCode').innerText = code;
                    let s = 30 - (Math.floor(Date.now() / 1000) % 30);
                    document.getElementById('timer').innerText = "يتغير الكود خلال: " + s + " ثانية";
                }, 1000);
            } else { alert("البيانات غير صحيحة أو الحساب غير مربوط!"); }
        } catch(e) { alert("خطأ في الاتصال بقاعدة البيانات!"); }
    }

    function generateSteamCode(secret) {
        try {
            const b64 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
            let bin = '';
            for (let i = 0; i < secret.length; i++) {
                const p = b64.indexOf(secret[i]);
                if (p !== -1) bin += p.toString(2).padStart(6, '0');
            }
            
            const time = Math.floor(Date.now() / 1000 / 30);
            const tBuf = new Uint8Array(8);
            for (let i = 0; i < 8; i++) tBuf[7 - i] = (time >> (i * 8)) & 0xff;

            const sha = new jsSHA("SHA-1", "BYTES");
            let sBytes = "";
            for(let i=0; i<bin.length; i+=8) sBytes += String.fromCharCode(parseInt(bin.substr(i,8), 2));
            
            sha.setHMACKey(sBytes, "BYTES");
            sha.update(String.fromCharCode.apply(null, tBuf));
            const h = sha.getHMAC("BYTES");

            const chars = "23456789BCDFGHJKMNPQRTVWXY";
            const off = h.charCodeAt(h.length - 1) & 0xf;
            let full = ((h.charCodeAt(off) & 0x7f) << 24) | ((h.charCodeAt(off + 1) & 0xff) << 16) | ((h.charCodeAt(off + 2) & 0xff) << 8) | (h.charCodeAt(off + 3) & 0xff);

            let res = "";
            for (let i = 0; i < 5; i++) {
                res += chars.charAt(full % chars.length);
                full = Math.floor(full / chars.length);
            }
            return res;
        } catch (e) { return "ERROR"; }
    }
</script>
</body>
</html>
